<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#05060c"/>
      <stop offset="100%" stop-color="#0a0d1a"/>
    </linearGradient>
    <radialGradient id="moon" cx="42%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#fbfcff"/>
      <stop offset="55%" stop-color="#e6eaf6"/>
      <stop offset="100%" stop-color="#b6c0e0"/>
    </radialGradient>
    <radialGradient id="halo" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="rgba(233,207,143,0.28)"/>
      <stop offset="60%" stop-color="rgba(233,207,143,0.06)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Stars -->
  <g fill="#f2f4fb">
    <circle cx="120" cy="90" r="1.6" opacity="0.6"/>
    <circle cx="300" cy="160" r="1.1" opacity="0.4"/>
    <circle cx="520" cy="70" r="1.4" opacity="0.5"/>
    <circle cx="760" cy="130" r="1" opacity="0.35"/>
    <circle cx="980" cy="90" r="1.7" opacity="0.6"/>
    <circle cx="1080" cy="240" r="1.2" opacity="0.4"/>
    <circle cx="180" cy="330" r="1.3" opacity="0.45"/>
    <circle cx="90" cy="520" r="1.5" opacity="0.5"/>
    <circle cx="1120" cy="470" r="1.1" opacity="0.4"/>
    <circle cx="640" cy="560" r="1.3" opacity="0.45"/>
  </g>

  <!-- Moon -->
  <circle cx="320" cy="315" r="290" fill="url(#halo)"/>
  <circle cx="320" cy="315" r="170" fill="url(#moon)"/>
  <circle cx="392" cy="285" r="150" fill="#05060c" opacity="0.92"/>

  <!-- Text -->
  <text x="640" y="250" font-family="'JetBrains Mono', monospace" font-size="26" letter-spacing="8" fill="#93a0c9">THE LITTLE DOVE BORN BENEATH THE MOON</text>
  <text x="638" y="345" font-family="'Cormorant Garamond', Georgia, serif" font-size="96" font-weight="300" fill="#fbfcff">Columbina</text>
  <text x="640" y="410" font-family="'Cormorant Garamond', Georgia, serif" font-size="44" font-style="italic" font-weight="300" fill="#a9a7d4">Hyposelenia</text>
  <text x="642" y="500" font-family="'JetBrains Mono', monospace" font-size="24" letter-spacing="4" fill="#e9cf8f">lore · secrets · lunar damage calculator</text>
  <text x="642" y="548" font-family="'JetBrains Mono', monospace" font-size="20" letter-spacing="4" fill="#6f7ead">columbina.uk</text>
