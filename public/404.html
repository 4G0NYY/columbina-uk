<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Columbina · Hyposelenia</title>
    <!--
      Single-page-app fallback for GitHub Pages (rafgraph/spa-github-pages).
      Encodes the requested path into a query string and redirects to the
      index, where the decode snippet in index.html restores the clean URL.
      pathSegmentsToKeep = 0 because we serve from an apex domain root.
    -->
    <script>
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol +
          "//" +
          l.hostname +
          (l.port ? ":" + l.port : "") +
          l.pathname
            .split("/")
            .slice(0, 1 + pathSegmentsToKeep)
            .join("/") +
          "/?/" +
          l.pathname
            .slice(1)
            .split("/")
            .slice(pathSegmentsToKeep)
            .join("/")
            .replace(/&/g, "~and~") +
          (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
          l.hash
      );
    </script>
  </head>
  <body></body>
</html>
